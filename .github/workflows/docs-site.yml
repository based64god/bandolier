name: docs site

# Deploy the static documentation site under docs-site/ to GitHub Pages.
# Pushes to the default branch that touch the site publish it; pull requests
# build it as a check without deploying.
on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs-site.yml"
  pull_request:
    paths:
      - "docs-site/**"
      - ".github/workflows/docs-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The site is plain static files — no build step. Disable Jekyll so
      # GitHub Pages serves the directory verbatim.
      - name: Prepare artifact
        run: touch docs-site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site

  deploy:
    # Only publish from the default branch; PRs stop after the build check.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
