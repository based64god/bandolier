name: agent-harness image

# Build the Go agent-harness container and publish it to GitHub Container
# Registry (ghcr.io). Pull requests build the image as a CI check but do not
# push; pushes to the default branch and version tags publish.
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "agent-harness/**"
      - "gollm/**"
      - ".github/workflows/agent-harness-image.yml"
  # No path filter on PRs: this build is a required merge-gate check, and a
  # path-filtered required check would deadlock PRs that don't touch these paths.
  # The build is cache-accelerated (type=gha); the push filter above keeps
  # main-branch publishing change-scoped.
  pull_request:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/bandolier-agent-harness

jobs:
  build-and-push:
    name: Agent-harness image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only authenticate when we intend to push (not on PRs from forks).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # Repo-root context: the harness build embeds the vendored gollm
          # module (go.mod replace ../gollm), so both trees must be present.
          context: .
          file: ./agent-harness/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
