name: Auto-merge

# Replaces the removed in-app auto-merge feature: instead of the web app calling
# GitHub's API when a run finishes, GitHub itself lands agent PRs. When the CI
# workflow finishes successfully on a Bandolier-produced pull request, enable
# GitHub's native auto-merge so the PR merges on its own once every required
# check has passed — no human click.
#
# Scoped to `bandolier/*` head branches so only agent PRs auto-merge; human PRs
# still need a manual merge. `workflow_run` runs from the default branch, so this
# only takes effect once merged to main.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable auto-merge on passing agent PRs
    runs-on: ubuntu-latest
    # Only when CI passed, only for pull-request CI runs (not the push-to-main
    # run), and only for a Bandolier branch.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      startsWith(github.event.workflow_run.head_branch, 'bandolier/')
    steps:
      - name: Enable auto-merge on the PR for this branch
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          # workflow_run reports the head branch, not the PR number — resolve the
          # open PR for that branch (empty if there is none, e.g. the branch was
          # pushed without a PR).
          pr="$(gh pr list --repo "$REPO" --head "$BRANCH" --state open \
            --json number --jq '.[0].number')"
          if [ -z "$pr" ]; then
            echo "No open PR for branch $BRANCH; nothing to merge."
            exit 0
          fi
          # --auto hands the merge back to GitHub: the PR lands once every
          # required status check passes and it's mergeable. Branch protection
          # still gates it, so a repo with none merges right away.
          gh pr merge "$pr" --repo "$REPO" --auto --squash
