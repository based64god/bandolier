{{- include "bandolier.validate" . -}}
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bandolier.fullname" . }}
  labels:
    {{- include "bandolier.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Required.
  BETTER_AUTH_SECRET: {{ .Values.secrets.betterAuthSecret | quote }}
  BETTER_AUTH_GITHUB_CLIENT_ID: {{ .Values.secrets.githubClientId | quote }}
  BETTER_AUTH_GITHUB_CLIENT_SECRET: {{ .Values.secrets.githubClientSecret | quote }}
  # Bundled Postgres derives this; external DB provides it directly.
  DATABASE_URL: {{ include "bandolier.databaseUrl" . | quote }}
  {{- with .Values.secrets.githubWebhookSecret }}
  GITHUB_WEBHOOK_SECRET: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.githubAppId }}
  GITHUB_APP_ID: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.githubAppPrivateKey }}
  GITHUB_APP_PRIVATE_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.githubAppClientId }}
  GITHUB_APP_CLIENT_ID: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.githubAppClientSecret }}
  GITHUB_APP_CLIENT_SECRET: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.appPassword }}
  APP_PASSWORD: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.vapidSubject }}
  VAPID_SUBJECT: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.vapidPrivateKey }}
  VAPID_PRIVATE_KEY: {{ . | quote }}
  {{- end }}
{{- end }}
