# Bandolier Agent Harness — Kubernetes reference manifest
#
# The Bandolier server creates namespaces, the bandolier-agent ServiceAccount, and
# per-job credential secrets dynamically at deploy time. There is NO shared,
# pre-created credentials secret: every agent runs with the deploying user's own
# credentials (GitHub via OAuth; AWS/Anthropic/OpenAI from their account settings),
# stored in a short-lived per-job secret that is garbage-collected with the Job.
#
# This file documents the resource shapes the server produces. The Job at the
# bottom is illustrative — to run it standalone, create your own secret and wire
# its keys in via secretKeyRef.

---
apiVersion: v1
kind: Namespace
metadata:
  name: bandolier-agents
  labels:
    app.kubernetes.io/managed-by: bandolier

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bandolier-agent
  namespace: bandolier-agents
  labels:
    app.kubernetes.io/managed-by: bandolier
# Agents do not need to talk to the Kubernetes API.
automountServiceAccountToken: false

---
# Example Job — the Bandolier dashboard generates Jobs with this shape.
# You can also apply this directly to test the image.
apiVersion: batch/v1
kind: Job
metadata:
  name: bandolier-agent-example
  namespace: bandolier-agents
  labels:
    app: bandolier-agent
    app.kubernetes.io/managed-by: bandolier
spec:
  # Keep the finished pod around for 1 h so you can inspect logs.
  ttlSecondsAfterFinished: 3600
  # Do not retry — a failed task should be retried intentionally.
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: bandolier-agent
        app.kubernetes.io/managed-by: bandolier
    spec:
      serviceAccountName: bandolier-agent
      restartPolicy: Never

      containers:
        - name: harness
          # Published by .github/workflows/agent-harness-image.yml.
          image: ghcr.io/based64god/bandolier-agent-harness:latest
          # IfNotPresent: use kind-loaded or cached images (local dev).
          # Always: force-pull on every pod start (remote registry / production).
          imagePullPolicy: IfNotPresent

          env:
            # ── Task configuration ────────────────────────────────────────
            - name: CLAUDE_TASK
              value: "Describe the repository structure and suggest improvements."
            - name: CLAUDE_MODEL
              value: "claude-sonnet-4-6"
            # Optional: cap on agentic turns. Unset means unlimited.
            - name: MAX_TURNS
              value: "100"
            # Optional: model used to write the PR title/description from the
            # commits, independent of CLAUDE_MODEL. The server sets this to the
            # latest Sonnet for PR-producing runs; unset falls back to the commit
            # subject (repo PRs) or issue title (issue PRs).
            - name: PR_WRITER_MODEL
              value: ""

            # ── Repository (optional) ─────────────────────────────────────
            - name: REPO_URL
              value: ""
            - name: BRANCH
              value: "main"

            # ── Git identity for commits ──────────────────────────────────
            - name: GIT_NAME
              value: "Bandolier Agent"
            - name: GIT_EMAIL
              value: "bandolier-agent@bandolier.local"

            # ── Credentials ───────────────────────────────────────────────
            # The server injects these from a per-job secret holding the
            # deploying user's own credentials. For a standalone test, point
            # these at a secret you create yourself.
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bandolier-agent-example-creds
                  key: ANTHROPIC_API_KEY
                  optional: true
            # Claude subscription (Pro/Max) auth: a long-lived OAuth token from
            # `claude setup-token`. The server injects exactly one of this or
            # ANTHROPIC_API_KEY; the claude CLI reads it from the env directly.
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: bandolier-agent-example-creds
                  key: CLAUDE_CODE_OAUTH_TOKEN
                  optional: true
            # Every non-native provider — OpenAI, Gemini, ChatGPT/Codex
            # subscription, Groq, OpenRouter, a self-hosted vLLM, GitHub
            # Copilot, and the rest of gollm's roster — runs the same way: the
            # server sets BANDOLIER_LLM_PROVIDER to the gollm backend id
            # (openai, chatgpt, vertex, gemini, groq, …) and injects that
            # backend's conventional credential env vars alongside it (e.g.
            # OPENAI_API_KEY, CODEX_AUTH_JSON, GOOGLE_APPLICATION_CREDENTIALS_JSON,
            # OPENROUTER_API_KEY). The harness's embedded gollm proxy routes by
            # the id and drives the run with Claude Code; it materializes
            # nothing — gollm reads each credential inline from the env.
            - name: BANDOLIER_LLM_PROVIDER
              value: ""
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bandolier-agent-example-creds
                  key: OPENAI_API_KEY
                  optional: true
            - name: CODEX_AUTH_JSON
              valueFrom:
                secretKeyRef:
                  name: bandolier-agent-example-creds
                  key: CODEX_AUTH_JSON
                  optional: true
            - name: GOOGLE_APPLICATION_CREDENTIALS_JSON
              valueFrom:
                secretKeyRef:
                  name: bandolier-agent-example-creds
                  key: GOOGLE_APPLICATION_CREDENTIALS_JSON
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: bandolier-agent-example-creds
                  key: GITHUB_TOKEN
                  optional: true

          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"

          volumeMounts:
            - name: workspace
              mountPath: /workspace

      volumes:
        - name: workspace
          emptyDir: {}
