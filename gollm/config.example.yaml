# gollm proxy configuration — litellm-compatible subset.
#
# The killer feature: run Claude Code against ANY backend. Claude Code asks
# for claude-* model names; each model_name below is an alias you map to a
# real deployment. Then:
#
#   export ANTHROPIC_BASE_URL=http://localhost:4000
#   export ANTHROPIC_AUTH_TOKEN=sk-master-1234   # the master_key below
#   claude
#
# Claude Code's requests to /v1/messages arrive here and are translated to
# whichever provider each alias maps to.

model_list:
  # Sonnet requests → GPT-5.2 on OpenAI.
  - model_name: claude-sonnet-4-5
    params:
      model: openai/gpt-5.2
      api_key: os.environ/OPENAI_API_KEY

  # Haiku requests (Claude Code uses it for background tasks) → a cheap
  # fast model on Groq.
  - model_name: claude-3-5-haiku-20241022
    params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  # Wildcard: any other claude-* name → local Ollama.
  - model_name: "claude-*"
    params:
      model: ollama/qwen3-coder:30b

  # Mixed fleets work too: the same alias twice load-balances 50/50.
  - model_name: gpt-4o
    params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-4o
    params:
      model: azure/my-gpt4o-deployment
      api_key: os.environ/AZURE_API_KEY
      api_base: os.environ/AZURE_API_BASE

  # Keeping a real Anthropic backend: requests pass through VERBATIM
  # (prompt caching and thinking signatures preserved).
  - model_name: claude-opus-4-6
    params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  # Embeddings route the same way.
  - model_name: text-embedding-3-small
    params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY

router_settings:
  routing_strategy: simple-shuffle   # round-robin | least-busy | latency-based
  num_retries: 2
  timeout: 600
  cooldown_time: 60
  allowed_fails: 3
  fallbacks:
    - claude-sonnet-4-5: ["claude-3-5-haiku-20241022"]
  context_window_fallbacks: []

general_settings:
  master_key: os.environ/GOLLM_MASTER_KEY
  # keys_file: ./gollm-keys.json   # persist virtual keys + spend across restarts
