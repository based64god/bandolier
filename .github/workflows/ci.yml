name: CI

# Lint, type-check, unit-test, and browser-smoke-test the web app (TypeScript)
# and vet/test the agent harness (Go) on every push to the default branch and
# every pull request — so the same checks gate merges and re-run on main.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web app (lint · typecheck · test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No explicit version: action-setup reads `packageManager` from
      # package.json, so the pnpm version is pinned in exactly one place.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # env.js validates a handful of vars at import time. Lint/typecheck never
      # execute it, so skip validation there. Tests must NOT skip it: vitest's
      # config supplies inert placeholders for the required vars, and skipping
      # would also drop the schema defaults some code under test relies on
      # (e.g. AGENT_EGRESS_BLOCKED_CIDRS).
      - name: Lint
        run: pnpm lint
        env:
          SKIP_ENV_VALIDATION: "1"

      - name: Typecheck
        run: pnpm typecheck
        env:
          SKIP_ENV_VALIDATION: "1"

      - name: Test
        run: pnpm test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: coverage/
          if-no-files-found: ignore

  integration:
    name: Integration tests (tRPC · routes · real Postgres)
    runs-on: ubuntu-latest
    # DB-backed integration suite: real tRPC procedures + route handlers against
    # a real, migrated Postgres. Kept separate from the fast hermetic `web` unit
    # job (distinct *.integration.test.ts glob + vitest.integration.config.ts) so
    # unit runtime and the coverage-badge numbers stay untouched.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: bandolier_test
        ports:
          - 5432:5432
        # Block the job until Postgres accepts connections.
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The vitest globalSetup applies the production migrations (./drizzle) to
      # this database before any test runs, so no separate migrate step is
      # needed. The other env vars are inert placeholders the integration config
      # also supplies; DATABASE_URL is the one real value, pointing at the
      # service container.
      - name: Integration tests
        run: pnpm test:integration
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/bandolier_test

  coverage-badge:
    name: Publish coverage badges
    # The README's coverage badges read shields.io endpoint JSON from the
    # `badges` branch (via img.shields.io/endpoint), so refresh them whenever
    # the default branch changes. A single-commit orphan branch is force-pushed
    # each time — no history accumulates. This is a separate job so that
    # `contents: write` is never granted to the jobs that execute
    # dependency/lifecycle code. Needs both the web job (its coverage artifact)
    # and the harness job (the Go coverage numbers).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [web, harness]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download web coverage report
        uses: actions/download-artifact@v4
        with:
          name: web-coverage
          path: coverage

      - name: Download Go coverage numbers
        uses: actions/download-artifact@v4
        with:
          name: go-coverage
          path: go-cov

      # Vercel must not deploy this push: vercel.json's git.deploymentEnabled
      # only takes effect if the file exists on the pushed branch (this one is
      # built from scratch, so copy it in), and "[vercel skip]" in the commit
      # message skips the deployment regardless.
      - name: Publish badge JSON to the badges branch
        run: |
          set -euo pipefail
          mkdir -p /tmp/badges
          node scripts/coverage-badge.mjs > /tmp/badges/coverage.json
          node scripts/badge.mjs "agent-harness" "$(cat go-cov/agent-harness.pct)" \
            > /tmp/badges/agent-harness-coverage.json
          node scripts/badge.mjs "gollm proxy" "$(cat go-cov/gollm-proxy.pct)" \
            > /tmp/badges/gollm-proxy-coverage.json
          cat /tmp/badges/*.json
          cp vercel.json /tmp/badges/vercel.json
          cd /tmp/badges
          git init -q -b badges
          git add coverage.json agent-harness-coverage.json gollm-proxy-coverage.json vercel.json
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -qm "Update coverage badges [vercel skip]"
          git push -f \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            badges
        env:
          GITHUB_TOKEN: ${{ github.token }}

  e2e:
    name: Browser smoke tests (playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No explicit version: action-setup reads `packageManager` from
      # package.json, so the pnpm version is pinned in exactly one place.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The e2e specs drive a real browser; fetch the matching Chromium plus its
      # system libraries. Keyed off the pinned `playwright` devDependency.
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      # e2e/run.ts boots `next dev`, waits for the /dev/* routes, then runs each
      # e2e/*.spec.ts against it. The routes contact no real services, so inert
      # placeholders satisfy env.js validation at import time.
      - name: Run browser smoke tests
        run: pnpm test:e2e
        env:
          BETTER_AUTH_URL: http://localhost:3137
          BETTER_AUTH_SECRET: ci
          BETTER_AUTH_GITHUB_CLIENT_ID: ci
          BETTER_AUTH_GITHUB_CLIENT_SECRET: ci
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci

  e2e-flow:
    name: Browser product-flow tests (playwright)
    runs-on: ubuntu-latest
    # The authenticated flows migrate + drive a real Postgres (the gate flow is
    # hermetic and ignores it).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: bandolier_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      # e2e/flow-run.ts boots `next dev` with the shared-password gate ENABLED
      # and runs the hermetic e2e/*.flow.ts specs (no DB/k8s/GitHub).
      - name: Run gate flow tests
        run: pnpm test:e2e:flow
        env:
          BETTER_AUTH_URL: http://localhost:3138
          BETTER_AUTH_SECRET: ci
          BETTER_AUTH_GITHUB_CLIENT_ID: ci
          BETTER_AUTH_GITHUB_CLIENT_SECRET: ci
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci

      # e2e/authflow-run.ts migrates the Postgres service, boots `next dev` with
      # the gate disabled + a fake Kubernetes server, and runs the authenticated
      # e2e/*.authflow.ts specs (better-auth session bypass; no GitHub OAuth).
      - name: Run authenticated flow tests
        run: pnpm test:e2e:authflow
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/bandolier_test

  harness:
    name: Agent harness (vet · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-harness
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: agent-harness/go.mod

      - name: Verify formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 -coverprofile=harness.cov ./...

      # The harness embeds the vendored gollm module (go.mod replace ../gollm),
      # so its tests gate the harness image too.
      - name: Test gollm (vendored module)
        working-directory: gollm
        run: go vet ./... && go test -race -count=1 ./...

      # Coverage percentages for the README badges (rendered by the
      # coverage-badge job, which has Node). The agent-harness badge covers the
      # whole module (cmd/harness + internal/acp) from the profile the Test step
      # already wrote; the gollm badge covers the proxy package the harness
      # embeds. Emitted as bare numbers so the badge job renders them through
      # the shared scripts/badge.mjs color scale.
      - name: Collect coverage numbers for badges
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/go-cov"
          go tool cover -func=harness.cov \
            | awk '/^total:/{gsub(/%/,"",$3); print $3}' \
            > "$GITHUB_WORKSPACE/go-cov/agent-harness.pct"
          ( cd "$GITHUB_WORKSPACE/gollm" \
            && go test -count=1 -coverprofile=proxy.cov ./proxy/ \
            && go tool cover -func=proxy.cov \
              | awk '/^total:/{gsub(/%/,"",$3); print $3}' \
              > "$GITHUB_WORKSPACE/go-cov/gollm-proxy.pct" )
          cat "$GITHUB_WORKSPACE"/go-cov/*.pct

      - name: Upload go coverage numbers
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: go-cov/

  chart:
    name: Helm chart (lint · kubeconform)
    runs-on: ubuntu-latest
    env:
      CHART: deploy/helm/bandolier
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Install kubeconform
        run: |
          curl -fsSL \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz kubeconform
          sudo mv kubeconform /usr/local/bin/

      # Lint with valid values so required-value validation passes and template
      # errors surface. The values themselves are inert placeholders.
      - name: Lint chart
        run: |
          helm lint "$CHART" \
            --set secrets.betterAuthSecret=ci \
            --set secrets.githubClientId=ci \
            --set secrets.githubClientSecret=ci \
            --set secrets.databaseUrl='postgresql://ci:ci@db:5432/ci'

      # Confirm the validation guard actually fails a misconfigured render
      # (missing required secrets) rather than silently producing bad manifests.
      - name: Assert validation rejects missing required values
        run: |
          if helm template ci "$CHART" >/dev/null 2>&1; then
            echo "Expected 'helm template' to fail without required secrets, but it succeeded." >&2
            exit 1
          fi
          echo "Validation correctly rejected the empty configuration."

      # Render both modes — external DB and bundled Postgres — and validate every
      # emitted resource against the upstream Kubernetes JSON schemas.
      - name: Render and validate manifests
        run: |
          set -euo pipefail
          common=(
            --set secrets.betterAuthSecret=ci
            --set secrets.githubClientId=ci
            --set secrets.githubClientSecret=ci
          )

          echo "── external DB + ingress + TLS ──"
          helm template ci "$CHART" "${common[@]}" \
            --set secrets.databaseUrl='postgresql://ci:ci@db:5432/ci' \
            --set ingress.enabled=true --set ingress.className=nginx \
            --set ingress.tls.enabled=true \
            | kubeconform -strict -summary -kubernetes-version 1.29.0 -

          echo "── bundled Postgres + bundled MinIO ──"
          helm template ci "$CHART" "${common[@]}" \
            --set postgres.mode=bundled \
            --set minio.enabled=true \
            --set minio.ingress.enabled=true --set minio.ingress.className=nginx \
            | kubeconform -strict -summary -kubernetes-version 1.29.0 -

          # CloudNativePG's Cluster is a CRD not in kubeconform's default schema
          # set, so allow its schema to be skipped (its siblings still validate).
          echo "── CloudNativePG ──"
          helm template ci "$CHART" "${common[@]}" \
            --set postgres.mode=cnpg \
            | kubeconform -strict -summary -ignore-missing-schemas \
                -kubernetes-version 1.29.0 -

  tofu:
    name: OpenTofu (fmt · validate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/terraform/digitalocean
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No tofu_version → the action installs the latest release.
      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Verify formatting
        run: tofu fmt -check -diff -recursive

      # -backend=false skips state configuration; init is only needed to fetch
      # the providers (pinned by .terraform.lock.hcl) so validate can
      # type-check resource schemas. No cloud credentials are used.
      - name: Init
        run: tofu init -backend=false

      - name: Validate
        run: tofu validate -no-color

  db-migrate:
    name: Apply migrations (drizzle)
    environment: production
    # Only apply migrations once changes have actually landed on the default
    # branch — never on pull requests, where DATABASE_URL is unavailable and a
    # migration would be premature.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [web, e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No explicit version: action-setup reads `packageManager` from
      # package.json, so the pnpm version is pinned in exactly one place.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # drizzle-kit migrate must use a DIRECT (unpooled) Neon connection — the
      # transaction pooler can apply the DDL but die before recording the
      # migration, leaving the bookkeeping table out of sync. Dropping the
      # "-pooler" host suffix yields the direct endpoint; it's a no-op if the
      # secret is already a direct URL.
      # drizzle.config.ts imports ~/env, which validates the full app schema
      # (GitHub OAuth, auth secrets, …) at load time. Migrations only need
      # DATABASE_URL, so skip validation — env.DATABASE_URL still resolves from
      # process.env when skipped.
      - name: Apply migrations
        run: |
          pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SKIP_ENV_VALIDATION: "1"

  # Auto-discovering merge gate. The `main` ruleset requires ONLY this check.
  # Rather than listing the jobs it guards (a list that would still have to be
  # kept in sync), it asks the Actions API for every OTHER job in this same
  # workflow run, waits for them to finish, and fails unless they all passed (a
  # skipped job — one turned off by an `if:` — is allowed). So a newly added CI
  # job is gated automatically: nothing to update here or in the repo settings.
  #
  # Trade-off vs. a `needs:` aggregate: this holds a runner polling for the CI
  # duration (extra minutes per PR), and only sees jobs in THIS workflow — a
  # brand-new *workflow file* would still need its own gate. Swap in a
  # `needs:`-based check if the runner time outweighs the zero-maintenance.
  ci-required:
    name: CI required
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
    steps:
      - name: Wait for every other job in this run and require it to pass
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          self="CI required"
          jobs=""
          # Poll until every other job in this run has completed (fails closed:
          # a job still pending after the timeout has no "success" conclusion).
          for _ in $(seq 1 180); do
            jobs="$(gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs" \
              --jq ".jobs[] | select(.name != \"$self\")")"
            pending="$(jq -rs '[.[] | select(.status != "completed")] | length' <<<"$jobs")"
            [ "$pending" -eq 0 ] && break
            echo "Waiting on $pending job(s) still running…"
            sleep 20
          done
          bad="$(jq -s '[.[] | select(.conclusion != "success" and .conclusion != "skipped")]' <<<"$jobs")"
          if [ "$(jq 'length' <<<"$bad")" -ne 0 ]; then
            echo "::error::One or more CI jobs did not pass:"
            jq -r '.[] | "  - \(.name): \(.conclusion // .status)"' <<<"$bad"
            exit 1
          fi
          echo "All CI jobs passed."
