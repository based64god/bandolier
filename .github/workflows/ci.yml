name: CI

# Lint, type-check, and test the web app (TypeScript) and the agent harness
# (Go) on every push to the default branch and every pull request.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web app (lint · typecheck · test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # env.js validates a handful of vars at import time; unit tests reach that
      # graph, so provide inert placeholders. No real services are contacted.
      - name: Lint
        run: pnpm lint
        env:
          SKIP_ENV_VALIDATION: "1"

      - name: Typecheck
        run: pnpm typecheck
        env:
          SKIP_ENV_VALIDATION: "1"

      - name: Test
        run: pnpm test:coverage
        env:
          SKIP_ENV_VALIDATION: "1"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: coverage/
          if-no-files-found: ignore

  harness:
    name: Agent harness (vet · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-harness
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: agent-harness/go.mod

      - name: Verify formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

  db-migrate:
    name: Apply migrations (drizzle)
    # Only apply migrations once changes have actually landed on the default
    # branch — never on pull requests, where DATABASE_URL is unavailable and a
    # migration would be premature.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # drizzle-kit migrate must use a DIRECT (unpooled) Neon connection — the
      # transaction pooler can apply the DDL but die before recording the
      # migration, leaving the bookkeeping table out of sync. Dropping the
      # "-pooler" host suffix yields the direct endpoint; it's a no-op if the
      # secret is already a direct URL.
      - name: Apply migrations
        run: |
          export DATABASE_URL="${POOLED_DATABASE_URL/-pooler/}"
          pnpm db:migrate
        env:
          POOLED_DATABASE_URL: ${{ secrets.DATABASE_URL }}
